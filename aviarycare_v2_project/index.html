<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AviaryCare</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

.header{
background:#4a5a3e;
color:white;
padding:20px;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.header h1{
margin:0;
font-size:26px;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.red{
background:#fde5e5;
}

.blue{
background:#dff3f7;
}

.btn-fait{
background:#4CAF50;
border:none;
color:white;
padding:6px 12px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.btn-fait:hover{
background:#3e9142;
}

</style>
</head>

<body>

<div class="header">
<h1>AviaryCare</h1>
<p>Gestion d’élevage d’oiseaux</p>
</div>

<div class="container">

<div class="card red">
<span>🪶 Baguage aujourd’hui — Oisillon</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card red">
<span>🪶 Baguage demain — Oisillon</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card blue">
<span>🌿 Graines et pâtée simple — Eau claire à administrer</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card red">
<span>🏠 Vérifier nid Cage A</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card blue">
<span>⚖️ Pesée mensuelle</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

</div>

<script>

function marquerFait(btn){
btn.parentElement.style.display="none"
}

</script>

</body>
</html>
