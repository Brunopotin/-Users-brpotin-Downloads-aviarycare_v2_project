<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AviaryCare</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.header{
background:#4a5a3e;
color:white;
padding:20px;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.header h1{
margin:0;
font-size:26px;
}

.badge{
background:#c9a227;
padding:4px 10px;
border-radius:10px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card.blue{
background:#dff3f7;
}

.card.red{
background:#fde5e5;
}

.tache{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.btn-fait{
background:#4CAF50;
border:none;
color:white;
padding:6px 12px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.btn-fait:hover{
background:#3e9142;
}

.compteur{
font-size:14px;
margin:10px 0;
color:#555;
}
.btn-fait{
background:#4CAF50;
border:none;
color:white;
padding:4px 10px;
border-radius:8px;
font-size:12px;
cursor:pointer;
margin-left:10px;
}

.tache{
display:flex;
justify-content:space-between;
align-items:center;
}
</style>
</head>


<body>

<div class="header">
<h1>AviaryCare</h1>
<div class="badge">Tâches : <span id="badgeTaches">0</span></div>
</div>


<div class="container">

<div class="card red tache" data-id="t1">
<span>🪶 Baguage aujourd’hui — Oisillon</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card red tache" data-id="t2">
<span>🪶 Baguage demain — Oisillon</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card blue tache" data-id="t3">
<span>🌿 Graines et pâtée simple — Eau claire</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card red tache" data-id="t4">
<span>🏠 Vérifier nid Cage A</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

<div class="card blue tache" data-id="t5">
<span>⚖️ Pesée mensuelle</span>
<button class="btn-fait" onclick="marquerFait(this)">Fait</button>
</div>

</div>


<script>

function marquerFait(btn){

const tache = btn.parentElement
const id = tache.dataset.id

localStorage.setItem("fait_"+id,"oui")

tache.style.display="none"

mettreAJourCompteur()

}


function verifierTaches(){

document.querySelectorAll(".tache").forEach(tache=>{

const id = tache.dataset.id

if(localStorage.getItem("fait_"+id)){
tache.style.display="none"
}

})

mettreAJourCompteur()

}


function mettreAJourCompteur(){

const visibles = [...document.querySelectorAll(".tache")]
.filter(t=>t.style.display!=="none").length

document.getElementById("badgeTaches").textContent = visibles

}


document.addEventListener("DOMContentLoaded", verifierTaches)

</script>


</body>
</html>
